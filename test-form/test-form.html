<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form</title>
</head>
<body>
    
    <article id="job-description">
        <p>This is a software internship job at Google for undergraduate students. Your role will primarily involve QA (Quality Assurance), so having knowledge of automation frameworks such as Playwright, would be useful.</p>
    </article>

    <form>

        <label for="first-name">First Name</label>
        <input id="first-name" type="text" placeholder="First Name">
        
        <label for="last-name">Last Name</label>
        <input id="last-name" type="text" placeholder="Last Name">
        
        <label for="email">Email</label>
        <input id="email" type="text" placeholder="Email">
        
        <!-- to test fuzzy matching -->
        <label for="github">Your Git</label>
        <input id="github" type="text" placeholder="Githu">
        
        <label for="question">Why do you want this job?</label>
        <textarea name="" id="question" placeholder="Why do you want this job?">Why do you want this job?</textarea>
    </form>

</body>
</html>
